name: Deploy to VPS over Tailscale

on:
  workflow_run:
    workflows: ["Build and push Docker images"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      app_version:
        description: Docker image version to deploy, for example 1.0.3
        required: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Determine app version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_VERSION="${{ github.event.inputs.app_version }}"
          else
            REF_NAME='${{ github.event.workflow_run.head_branch }}'
            APP_VERSION="${REF_NAME#v}"
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy files
        run: |
          mkdir -p deploy/docker
          cp docker-compose.yml deploy/docker-compose.yml
          cp .env.example deploy/.env.example
          cp docker/init.sql deploy/docker/init.sql

      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TS_VPS_HOST }}
          username: ${{ secrets.TS_VPS_USER }}
          key: ${{ secrets.TS_VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.TS_VPS_APP_DIR }}/docker

      - name: Upload compose, env example, and SQL
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TS_VPS_HOST }}
          username: ${{ secrets.TS_VPS_USER }}
          key: ${{ secrets.TS_VPS_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/.env.example,deploy/docker/init.sql"
          target: ${{ secrets.TS_VPS_APP_DIR }}
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TS_VPS_HOST }}
          username: ${{ secrets.TS_VPS_USER }}
          key: ${{ secrets.TS_VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.TS_VPS_APP_DIR }}
            test -f .env || cp .env.example .env
            APP_VERSION='${{ steps.version.outputs.app_version }}'
            if grep -q '^APP_VERSION=' .env; then
              sed -i "s/^APP_VERSION=.*/APP_VERSION=${APP_VERSION}/" .env
            else
              echo "APP_VERSION=${APP_VERSION}" >> .env
            fi
            docker compose pull
            docker compose up -d
